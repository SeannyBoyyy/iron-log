<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Iron Log — Progress Tracker</title>
<meta name="description" content="A no-nonsense PWA for tracking progressive overload: log your split, see your last numbers, know exactly when to add weight.">
<meta name="theme-color" content="#1C1B1A">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --iron:#1C1B1A;
    --iron-soft:#262422;
    --iron-soft-2:#312E2A;
    --chalk:#EDEAE3;
    --chalk-dim:#A39E94;
    --rust:#C1572A;
    --rust-dim:#8F4520;
    --steel:#6E8B98;
    --line: rgba(237,234,227,0.09);
    --radius: 14px;
    --display: 'Oswald', sans-serif;
    --body: 'Inter', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: #131211;
    color:var(--chalk);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  button, input, select, textarea{ font-family:inherit; color:inherit; }
  button{ cursor:pointer; }
  ::selection{ background:var(--rust-dim); color:var(--chalk); }

  :focus-visible{ outline:2px solid var(--steel); outline-offset:2px; }

  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    min-height:100dvh;
    background:var(--iron);
    display:flex;
    flex-direction:column;
    position:relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.4);
  }

  /* ---------- header ---------- */
  .app-header{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 18px 14px;
    background:linear-gradient(180deg, var(--iron) 70%, transparent);
  }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:30px; height:30px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--rust) 0%, var(--rust-dim) 70%);
    position:relative; flex:none;
  }
  .brand-mark::after{
    content:''; position:absolute; inset:35%; border-radius:50%; background:var(--iron);
  }
  .brand-name{
    font-family:var(--display); font-weight:600; letter-spacing:0.04em;
    font-size:19px; text-transform:uppercase;
  }
  .icon-btn{
    width:38px; height:38px; border-radius:50%;
    background:var(--iron-soft); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    color:var(--chalk-dim);
  }
  .icon-btn:active{ background:var(--iron-soft-2); }
  .icon-btn svg{ width:18px; height:18px; }

  /* ---------- main / views ---------- */
  main{ flex:1; padding:0 16px 110px; }
  .view.hidden{ display:none; }

  .cycle-track{
    display:flex; gap:6px; padding:2px 2px 18px;
  }
  .cycle-pip{
    flex:1; height:5px; border-radius:3px; background:var(--iron-soft-2);
    position:relative;
  }
  .cycle-pip.is-current{ background:var(--rust); }
  .cycle-pip.is-rest::before{
    content:''; position:absolute; inset:0; border-radius:3px;
    background:repeating-linear-gradient(135deg, var(--iron-soft-2) 0 3px, transparent 3px 6px);
  }
  .cycle-pip.is-rest.is-current::before{
    background:repeating-linear-gradient(135deg, var(--rust) 0 3px, var(--rust-dim) 3px 6px);
  }

  .day-heading{ margin-bottom:16px; }
  .day-eyebrow{
    font-family:var(--mono); font-size:12px; color:var(--chalk-dim);
    letter-spacing:0.08em; text-transform:uppercase; margin:0 0 4px;
  }
  .day-title{
    font-family:var(--display); font-size:34px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.01em; margin:0;
  }

  /* ---------- exercise card ---------- */
  .ex-card{
    background:var(--iron-soft);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:12px;
  }
  .ex-card-top{
    display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:12px;
  }
  .ex-name{ font-family:var(--display); font-size:17px; font-weight:600; letter-spacing:0.01em; line-height:1.2; }
  .ex-meta{ font-family:var(--mono); font-size:11.5px; color:var(--chalk-dim); margin-top:4px; letter-spacing:0.02em; }
  .ex-muscle-tag{ color:var(--steel); }

  .streak-dots{ display:flex; gap:5px; flex:none; align-items:center; }
  .streak-dot{
    width:13px; height:13px; border-radius:50%;
    border:1.5px solid var(--chalk-dim); opacity:0.55;
  }
  .streak-dot.filled{
    background:var(--rust); border-color:var(--rust); opacity:1;
  }

  .ascend-badge{
    display:flex; align-items:center; gap:8px;
    background:linear-gradient(90deg, var(--rust-dim), var(--rust));
    color:var(--chalk); border-radius:10px;
    padding:9px 12px; margin-bottom:12px;
    font-family:var(--display); font-size:13.5px; letter-spacing:0.03em; text-transform:uppercase;
  }
  @media (prefers-reduced-motion: no-preference){
    .ascend-badge{ animation: ascend-in 420ms ease-out; }
  }
  @keyframes ascend-in{
    0%{ transform:translateX(-6px); opacity:0; }
    100%{ transform:translateX(0); opacity:1; }
  }
  .ascend-badge svg{ width:16px; height:16px; flex:none; }

  .set-rows{ display:flex; flex-direction:column; gap:8px; }
  .set-row{ display:flex; align-items:center; gap:8px; }
  .set-row-label{
    font-family:var(--mono); font-size:12px; color:var(--chalk-dim);
    width:18px; flex:none; text-align:center;
  }
  .set-input{
    flex:1; background:var(--iron); border:1px solid var(--line);
    border-radius:9px; padding:10px 10px; font-family:var(--mono);
    font-size:15px; color:var(--chalk); min-width:0;
  }
  .set-input::placeholder{ color:var(--chalk-dim); opacity:0.6; }
  .set-input.unit{ flex:0 0 auto; width:54px; text-align:center; }
  .set-x{ color:var(--chalk-dim); font-family:var(--mono); font-size:13px; flex:none; }

  .last-line{
    font-family:var(--mono); font-size:11.5px; color:var(--chalk-dim);
    margin-top:10px;
  }

  .rest-card{
    background:var(--iron-soft); border:1px solid var(--line); border-radius:var(--radius);
    padding:32px 20px; text-align:center; margin-top:8px;
  }
  .rest-card .ex-name{ font-size:20px; display:block; margin-bottom:8px; }
  .rest-card p{ color:var(--chalk-dim); font-size:14px; line-height:1.5; margin:0 0 20px; }

  .btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; border:none; border-radius:12px; padding:15px;
    font-family:var(--display); font-size:15px; letter-spacing:0.03em; text-transform:uppercase;
  }
  .btn-primary{ background:var(--rust); color:var(--chalk); }
  .btn-primary:active{ background:var(--rust-dim); }
  .btn-ghost{ background:var(--iron-soft-2); color:var(--chalk); }
  .btn-outline{ background:transparent; color:var(--chalk-dim); border:1px solid var(--line); }
  .btn-small{ padding:10px 14px; font-size:12.5px; width:auto; }
  .btn-danger{ background:transparent; color:var(--rust); border:1px solid var(--rust-dim); }

  .finish-bar{ margin-top:18px; }

  /* ---------- progress view ---------- */
  .section-title{
    font-family:var(--display); font-size:13px; letter-spacing:0.1em; text-transform:uppercase;
    color:var(--chalk-dim); margin:22px 0 10px;
  }
  .section-title:first-child{ margin-top:6px; }

  .progress-card{
    background:var(--iron-soft); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 16px; margin-bottom:10px;
  }
  .progress-card-head{ display:flex; justify-content:space-between; align-items:center; gap:10px; cursor:pointer; }
  .progress-stats{ display:flex; gap:16px; margin-top:12px; }
  .stat{ flex:1; }
  .stat-label{ font-family:var(--mono); font-size:10.5px; color:var(--chalk-dim); text-transform:uppercase; letter-spacing:0.06em; }
  .stat-value{ font-family:var(--display); font-size:20px; margin-top:2px; }
  .spark-wrap{ margin-top:12px; }
  .history-table{ width:100%; border-collapse:collapse; margin-top:12px; font-family:var(--mono); font-size:12px; }
  .history-table th{ text-align:left; color:var(--chalk-dim); font-weight:500; padding:4px 6px; border-bottom:1px solid var(--line); }
  .history-table td{ padding:6px 6px; border-bottom:1px solid var(--line); }
  .history-table tr:last-child td{ border-bottom:none; }
  .empty-note{ color:var(--chalk-dim); font-size:13px; padding:20px 4px; text-align:center; line-height:1.5; }

  /* ---------- split view ---------- */
  .day-card{
    background:var(--iron-soft); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 16px; margin-bottom:10px;
  }
  .day-card-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .day-label-input{
    background:transparent; border:none; font-family:var(--display); font-size:17px;
    color:var(--chalk); padding:0; width:140px;
  }
  .day-num{ font-family:var(--mono); font-size:11px; color:var(--chalk-dim); }
  .chip-row{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{
    display:flex; align-items:center; gap:6px;
    background:var(--iron-soft-2); border:1px solid var(--line); border-radius:20px;
    padding:7px 10px 7px 12px; font-size:12.5px;
  }
  .chip button{ background:none; border:none; color:var(--chalk-dim); font-size:14px; line-height:1; padding:0; }
  .chip-add{
    background:transparent; border:1px dashed var(--line); color:var(--chalk-dim);
  }

  .day-ex-list{ display:flex; flex-direction:column; gap:5px; margin-bottom:6px; }
  .day-ex-item{ display:flex; align-items:center; gap:8px; background:var(--iron); border:1px solid var(--line); border-radius:9px; padding:8px 10px; }
  .day-ex-reorder{ display:flex; flex-direction:column; gap:2px; flex:none; }
  .day-ex-arrow{ background:none; border:1px solid var(--line); color:var(--chalk-dim); font-size:11px; padding:2px 6px; line-height:1.3; border-radius:4px; }
  .day-ex-arrow:disabled{ opacity:0.2; pointer-events:none; }
  .day-ex-arrow:not(:disabled):active{ background:var(--iron-soft-2); color:var(--chalk); }
  .day-ex-name{ flex:1; font-size:12.5px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .day-ex-remove{ background:none; border:none; color:var(--chalk-dim); font-size:17px; line-height:1; padding:2px 6px; }

  .ex-row{
    display:flex; align-items:center; gap:10px;
    background:var(--iron-soft); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:8px;
  }
  .ex-row-main{ flex:1; min-width:0; }
  .ex-row-name{ font-size:14px; font-weight:600; }
  .ex-row-name-input{ background:transparent; border:none; font-family:inherit; font-size:14px; font-weight:600; color:var(--chalk); width:100%; padding:0; }
  .ex-row-sub{ font-family:var(--mono); font-size:11px; color:var(--chalk-dim); margin-top:5px; display:flex; gap:10px; flex-wrap:wrap; }
  .mini-field{ display:flex; align-items:center; gap:4px; }
  .mini-field input{
    width:42px; background:var(--iron); border:1px solid var(--line); border-radius:6px;
    color:var(--chalk); font-family:var(--mono); font-size:11px; padding:3px 4px; text-align:center;
  }
  .ex-row-del{ flex:none; background:none; border:none; color:var(--chalk-dim); padding:6px; }

  /* ---------- bottom nav ---------- */
  .bottom-nav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px;
    display:flex; background:rgba(28,27,26,0.92); backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
    padding:8px 8px calc(8px + env(safe-area-inset-bottom));
    z-index:30;
  }
  .nav-btn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    background:none; border:none; color:var(--chalk-dim); padding:8px 4px; border-radius:10px;
  }
  .nav-btn svg{ width:21px; height:21px; }
  .nav-btn span{ font-family:var(--display); font-size:10.5px; letter-spacing:0.05em; text-transform:uppercase; }
  .nav-btn.active{ color:var(--rust); }

  /* ---------- sheet / modal ---------- */
  .sheet-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:40;
    display:flex; align-items:flex-end; justify-content:center;
  }
  .sheet-backdrop.hidden{ display:none; }
  .sheet{
    width:100%; max-width:480px; max-height:84vh; overflow-y:auto;
    background:var(--iron-soft); border-radius:18px 18px 0 0;
    padding:18px 18px calc(18px + env(safe-area-inset-bottom));
    border-top:1px solid var(--line);
  }
  @media (prefers-reduced-motion: no-preference){
    .sheet{ animation: sheet-up 220ms ease-out; }
  }
  @keyframes sheet-up{ 0%{ transform:translateY(16px); opacity:0; } 100%{ transform:translateY(0); opacity:1; } }
  .sheet-handle{ width:36px; height:4px; background:var(--line); border-radius:3px; margin:0 auto 14px; }
  .sheet-title{ font-family:var(--display); font-size:18px; text-transform:uppercase; letter-spacing:0.02em; margin:0 0 14px; }
  .field-label{ font-family:var(--mono); font-size:11px; color:var(--chalk-dim); text-transform:uppercase; letter-spacing:0.05em; margin:18px 0 8px; display:block; }
  .field-label:first-of-type{ margin-top:4px; }
  .text-input, .select-input{
    width:100%; background:var(--iron); border:1px solid var(--line); border-radius:9px;
    padding:11px 12px; font-size:14px; color:var(--chalk);
  }
  .text-input:focus, .select-input:focus{ border-color:var(--rust); outline:none; }

  .muscle-pill-grid{
    display:flex; flex-wrap:wrap; gap:8px;
  }
  .muscle-pill{
    flex:none; background:var(--iron); border:1px solid var(--line); color:var(--chalk-dim);
    border-radius:20px; padding:9px 15px; font-size:13px; white-space:nowrap; cursor:pointer;
    transition: background 120ms, color 120ms, border-color 120ms;
  }
  .muscle-pill.active{ background:var(--rust); border-color:var(--rust); color:var(--chalk); }
  .muscle-pill:active{ opacity:0.75; }

  .stepper{
    display:flex; align-items:center; background:var(--iron); border:1px solid var(--line);
    border-radius:9px; overflow:hidden;
  }
  .stepper-btn{
    width:52px; height:52px; background:none; border:none; color:var(--chalk);
    font-size:24px; line-height:1; display:flex; align-items:center; justify-content:center;
    flex:none; -webkit-tap-highlight-color:transparent;
  }
  .stepper-btn:active{ background:var(--iron-soft-2); }
  .stepper-btn:disabled{ color:var(--chalk-dim); opacity:0.3; pointer-events:none; }
  .stepper-val{
    flex:1; text-align:center; font-family:var(--mono); font-size:18px; color:var(--chalk);
    border:none; background:none; padding:0; min-width:0; outline:none; -webkit-appearance:none;
  }
  .stepper-val::-webkit-inner-spin-button,
  .stepper-val::-webkit-outer-spin-button{ -webkit-appearance:none; margin:0; }
  .stepper-val::-moz-spin-button{ display:none; }

  .rep-row{ display:flex; gap:8px; }
  .rep-row .stepper{ flex:1; }
  .muscle-filter{ display:flex; gap:6px; overflow-x:auto; padding:2px 0 12px; }
  .muscle-filter::-webkit-scrollbar{ display:none; }
  .muscle-chip{
    flex:none; background:var(--iron); border:1px solid var(--line); color:var(--chalk-dim);
    border-radius:20px; padding:7px 13px; font-size:12px; white-space:nowrap;
  }
  .muscle-chip.active{ background:var(--rust); border-color:var(--rust); color:var(--chalk); }
  .picker-list{ display:flex; flex-direction:column; gap:6px; max-height:280px; overflow-y:auto; }
  .picker-item{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--iron); border:1px solid var(--line); border-radius:10px;
    padding:11px 13px; font-size:13.5px; text-align:left; width:100%;
  }
  .picker-item span.muscle{ color:var(--steel); font-family:var(--mono); font-size:11px; }
  .picker-item.added{ opacity:0.4; }

  .settings-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:13px 0; border-bottom:1px solid var(--line);
  }
  .settings-row:last-of-type{ border-bottom:none; }
  .settings-row-text{ font-size:13.5px; }
  .settings-row-sub{ font-family:var(--mono); font-size:11px; color:var(--chalk-dim); margin-top:3px; }

  /* ---------- toast ---------- */
  .toast{
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
    background:var(--chalk); color:var(--iron); font-size:13px; font-weight:600;
    padding:11px 18px; border-radius:30px; z-index:50; max-width:92%;
    box-shadow:0 10px 24px rgba(0,0,0,0.35);
    display:flex; align-items:center; gap:12px;
  }
  .toast.hidden{ display:none; }
  .toast-msg{ flex:1; }
  .toast-undo{
    background:none; border:1.5px solid var(--iron-soft-2); border-radius:20px;
    color:var(--iron); font-family:var(--display); font-size:11.5px; letter-spacing:0.05em;
    text-transform:uppercase; padding:5px 11px; flex:none; cursor:pointer;
  }
  .toast-undo:active{ background:var(--iron-soft-2); }

  .install-hint{
    background:var(--iron-soft); border:1px solid var(--line); border-radius:12px;
    padding:13px 14px; margin-bottom:16px; font-size:12.5px; color:var(--chalk-dim); line-height:1.5;
  }
  .install-hint button{ background:none; border:none; color:var(--steel); font-size:12px; padding:0; margin-left:4px; }

  .onboarding-card{
    background:linear-gradient(135deg, rgba(193,87,42,0.18), var(--iron-soft));
    border:1px solid rgba(193,87,42,0.35); border-radius:var(--radius);
    padding:14px 40px 14px 16px; margin-bottom:16px; position:relative;
  }
  .onboarding-title{
    font-family:var(--display); font-size:12px; text-transform:uppercase;
    letter-spacing:0.08em; color:var(--rust); margin:0 0 8px;
  }
  .onboarding-body{ font-size:12.5px; color:var(--chalk-dim); line-height:1.6; margin:0; }
  .onboarding-body strong{ color:var(--chalk); }
  .onboarding-close{
    position:absolute; top:10px; right:12px;
    background:none; border:none; color:var(--chalk-dim); font-size:19px; line-height:1; padding:2px 5px;
  }

  .streak-wrap{ display:flex; flex-direction:column; align-items:center; gap:3px; flex:none; }
  .streak-count{ font-family:var(--mono); font-size:10px; color:var(--chalk-dim); white-space:nowrap; }

  .set-actions{ display:flex; gap:8px; margin-top:10px; align-items:stretch; }
  .btn-add-set{
    flex:1; background:var(--iron-soft-2); border:1px solid var(--line); border-radius:10px;
    color:var(--chalk); font-family:var(--display); font-size:13px; letter-spacing:0.04em;
    text-transform:uppercase; padding:12px 14px;
  }
  .btn-add-set:active{ background:var(--iron); }
  .btn-remove-set{
    flex:none; width:46px; background:none; border:1px solid var(--line); border-radius:10px;
    color:var(--chalk-dim); font-size:20px; line-height:1; display:flex; align-items:center; justify-content:center;
  }
  .btn-remove-set:not(:disabled):active{ background:var(--iron-soft-2); color:var(--chalk); }
  .btn-remove-set:disabled{ opacity:0.22; pointer-events:none; cursor:default; }

  .expand-hint{ font-family:var(--mono); font-size:10.5px; color:var(--chalk-dim); display:flex; align-items:center; gap:4px; }
  .expand-hint svg{ width:12px; height:12px; transition:transform 200ms; }
  .progress-card-head.open .expand-hint svg{ transform:rotate(180deg); }

  .segment-ctrl{
    display:flex; background:var(--iron-soft-2); border-radius:12px; padding:3px; margin-bottom:18px;
  }
  .segment-btn{
    flex:1; background:none; border:none; color:var(--chalk-dim); border-radius:9px;
    padding:10px 0; font-family:var(--display); font-size:12.5px; letter-spacing:0.05em; text-transform:uppercase;
  }
  .segment-btn.active{ background:var(--iron-soft); color:var(--chalk); box-shadow:0 1px 4px rgba(0,0,0,0.3); }

  .ex-edit-card{
    background:var(--iron-soft); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px 16px; margin-bottom:10px;
  }
  .ex-edit-head{ display:flex; align-items:flex-start; gap:10px; margin-bottom:14px; }
  .ex-edit-name-wrap{ flex:1; min-width:0; }
  .ex-edit-name{
    background:transparent; border:none; border-bottom:1px solid var(--line);
    color:var(--chalk); font-size:14px; font-weight:600; width:100%; padding:0 0 5px; margin-bottom:5px;
    font-family:inherit;
  }
  .ex-edit-muscle{ font-family:var(--mono); font-size:11px; color:var(--steel); }
  .ex-edit-fields{ display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:8px; }
  .ex-edit-field{ display:flex; flex-direction:column; gap:5px; }
  .ex-edit-label{ font-family:var(--mono); font-size:10px; color:var(--chalk-dim); text-transform:uppercase; letter-spacing:0.05em; }
  .ex-edit-input{
    background:var(--iron); border:1px solid var(--line); border-radius:8px;
    color:var(--chalk); font-family:var(--mono); font-size:14px; padding:9px 4px;
    text-align:center; width:100%; -moz-appearance:textfield;
  }
  .ex-edit-input::-webkit-inner-spin-button,
  .ex-edit-input::-webkit-outer-spin-button{ -webkit-appearance:none; margin:0; }
  .ex-edit-input:focus{ border-color:var(--rust); outline:none; }

  .day-check-row{
    display:flex; align-items:center; gap:12px; padding:13px 2px;
    border-bottom:1px solid var(--line); cursor:pointer; font-size:14px;
  }
  .day-check-row:last-of-type{ border-bottom:none; }
  .day-check{ width:20px; height:20px; accent-color:var(--rust); cursor:pointer; flex:none; }
</style>
</head>
<body>
<div class="app">

  <header class="app-header">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-name">Iron Log</div>

    <button class="icon-btn" id="btn-settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </header>

  <main id="view-root">
    <section id="view-today" class="view"></section>

      <span>Today</span>
    </button>
    <button class="nav-btn" data-view="progress">

      <span>Progress</span>
    </button>
    <button class="nav-btn" data-view="split">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"></rect><rect x="14" y="3" width="7" height="7" rx="1.5"></rect><rect x="3" y="14" width="7" height="7" rx="1.5"></rect><rect x="14" y="14" width="7" height="7" rx="1.5"></rect></svg>
      <span>Split</span>
    </button>
  </nav>

  <div class="sheet-backdrop hidden" id="sheet-backdrop">
    <div class="sheet" id="sheet-content"></div>
  </div>

  <div class="toast hidden" id="toast"></div>
</div>

<script>
/* ===================== IRON LOG — app logic ===================== */

const STORAGE_KEY = 'ironlog.v1';
const HINT_KEY = 'ironlog.hint.dismissed';
let splitSegment = 'days';

const MUSCLES = ['Chest','Back','Shoulders','Biceps','Triceps','Quads','Hamstrings','Glutes','Calves','Abs'];

const EXERCISE_LIBRARY = [
  {name:'Barbell Bench Press', muscle:'Chest'},
  {name:'Incline Dumbbell Press', muscle:'Chest'},
  {name:'Pec Dec', muscle:'Chest'},
  {name:'Chest Press Machine', muscle:'Chest'},
  {name:'Cable Fly', muscle:'Chest'},
  {name:'Lat Pulldown', muscle:'Back'},
  {name:'Single-Arm Lat Pulldown', muscle:'Back'},
  {name:'T-Bar Row', muscle:'Back'},
  {name:'Seated Cable Row', muscle:'Back'},
  {name:'Pull-Up', muscle:'Back'},
  {name:'Shoulder Press', muscle:'Shoulders'},
  {name:'Lateral Raise (Machine/Cable)', muscle:'Shoulders'},
  {name:'Rear Delt Fly', muscle:'Shoulders'},
  {name:'Front Raise', muscle:'Shoulders'},
  {name:'Preacher Curl', muscle:'Biceps'},
  {name:'Hammer Curl', muscle:'Biceps'},
  {name:'Cable Curl', muscle:'Biceps'},
  {name:'Tricep Pushdown', muscle:'Triceps'},
  {name:'Overhead Tricep Extension', muscle:'Triceps'},
  {name:'Skull Crusher', muscle:'Triceps'},
  {name:'Squat', muscle:'Quads'},
  {name:'Bulgarian Split Squat', muscle:'Quads'},
  {name:'Leg Extension', muscle:'Quads'},
  {name:'Leg Press', muscle:'Quads'},
  {name:'Romanian Deadlift', muscle:'Hamstrings'},
  {name:'Hamstring Curl', muscle:'Hamstrings'},
  {name:'Stiff-Leg Deadlift', muscle:'Hamstrings'},
  {name:'Hip Thrust', muscle:'Glutes'},
  {name:'Cable Kickback', muscle:'Glutes'},
  {name:'Standing Calf Raise', muscle:'Calves'},
  {name:'Seated Calf Raise', muscle:'Calves'},
  {name:'Ab Machine Crunch', muscle:'Abs'},
  {name:'Cable Crunch', muscle:'Abs'},
  {name:'Hanging Leg Raise', muscle:'Abs'},
];

/* ---------- helpers ---------- */
function uid(prefix){ return prefix + '_' + Math.random().toString(36).slice(2,9); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function clampInt(v, min, max, fallback){
  const n = parseInt(v,10);
  if(isNaN(n)) return fallback;
  return Math.min(max, Math.max(min, n));
}
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatWeight(n){
  const num = Number(n);
  if(!isFinite(num)) return '0';
  return Number.isInteger(num) ? String(num) : num.toFixed(2).replace(/0+$/,'').replace(/\.$/,'');
}
function formatDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, {month:'short', day:'numeric'});
}
function defaultIncrement(muscle){
  const big = ['Quads','Back','Hamstrings','Glutes'];
  return big.includes(muscle) ? 2.5 : 1;
}

/* ---------- data ---------- */
function seedData(){
  function ex(name, muscle, increment){
    const id = uid('ex');
    return [id, {id, name, muscle, sets:2, repMin:8, repMax:10, increment, custom:false}];
  }
  const entries = [
    ex('Chest Machine Press (Upper Chest)','Chest',2.5),
    ex('Pec Dec','Chest',1),
    ex('Shoulder Press','Shoulders',2),
    ex('Lateral Raise (Machine/Cable)','Shoulders',1),
    ex('Tricep Pushdown','Triceps',1),
    ex('Lat Pulldown','Back',2.5),
    ex('Single-Arm Lat Pulldown','Back',1),
    ex('T-Bar Row','Back',2.5),
    ex('Preacher Curl','Biceps',1),
    ex('Hammer Curl','Biceps',1),
    ex('Hamstring Curl','Hamstrings',1),
    ex('SDL / RDL','Hamstrings',2.5),
    ex('Squat / Bulgarian Split Squat','Quads',2.5),
    ex('Leg Extension','Quads',1),
    ex('Abs Machine (Spinal Flexion)','Abs',1),
  ];
  const exercises = {};
  entries.forEach(([id,obj]) => { exercises[id] = obj; });
  const idByName = (name) => entries.find(([,o]) => o.name===name)[0];

  const push = ['Chest Machine Press (Upper Chest)','Pec Dec','Shoulder Press','Lateral Raise (Machine/Cable)','Tricep Pushdown'].map(idByName);
  const pull = ['Lat Pulldown','Single-Arm Lat Pulldown','T-Bar Row','Preacher Curl','Hammer Curl'].map(idByName);
  const legs = ['Hamstring Curl','SDL / RDL','Squat / Bulgarian Split Squat','Leg Extension','Abs Machine (Spinal Flexion)'].map(idByName);

  const days = [
    {id:uid('day'), label:'Push', exerciseIds:push.slice()},
    {id:uid('day'), label:'Pull', exerciseIds:pull.slice()},
    {id:uid('day'), label:'Legs', exerciseIds:legs.slice()},
    {id:uid('day'), label:'Rest', exerciseIds:[]},
    {id:uid('day'), label:'Push', exerciseIds:push.slice()},
    {id:uid('day'), label:'Pull', exerciseIds:pull.slice()},
    {id:uid('day'), label:'Legs', exerciseIds:legs.slice()},
    {id:uid('day'), label:'Rest', exerciseIds:[]},
  ];

  return { schemaVersion:1, cycleIndex:0, days, exercises, logs:[] };
}

let state = load();

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return seedData();
    const parsed = JSON.parse(raw);
    if(!parsed || !parsed.days || !parsed.exercises) return seedData();
    return parsed;
  }catch(e){
    console.error('Iron Log: failed to load, reseeding', e);
    return seedData();
  }
}
function save(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ toast('Could not save — device storage may be full.'); }
}

/* ---------- progression logic ---------- */
function exerciseLogsInOrder(exId){
  return state.logs
    .filter(l => l.entries && l.entries[exId] && l.entries[exId].length)
    .map(l => ({date:l.date, sets:l.entries[exId]}))
    .sort((a,b) => a.date.localeCompare(b.date));
}

function getProgressionStatus(exId){
  const ex = state.exercises[exId];
  if(!ex) return {streak:0, ready:false, lastSession:null, suggestedWeight:null};
  const history = exerciseLogsInOrder(exId);
  const last2 = history.slice(-2);

  const hitTop = (session) => session.sets.length>0 &&
    session.sets.every(s => s.reps >= ex.repMax && s.weight === session.sets[0].weight);

  let streak = 0;
  if(last2.length===2){
    const sameWeight = last2[0].sets[0] && last2[1].sets[0] && last2[0].sets[0].weight === last2[1].sets[0].weight;
    if(hitTop(last2[0]) && hitTop(last2[1]) && sameWeight) streak = 2;
    else if(hitTop(last2[1])) streak = 1;
  } else if(last2.length===1 && hitTop(last2[0])){
    streak = 1;
  }

  const lastSession = history[history.length-1] || null;
  const suggestedWeight = (lastSession && lastSession.sets[0])
    ? +(lastSession.sets[0].weight + ex.increment).toFixed(2)
    : null;

  return { streak, ready: streak>=2, lastSession, suggestedWeight };
}

/* ---------- mutations ---------- */
function advanceCycle(){
  state.cycleIndex = (state.cycleIndex + 1) % state.days.length;
}

function finishWorkout(){
  const day = state.days[state.cycleIndex];
  const entries = {};
  let anyFilled = false;

  day.exerciseIds.forEach(exId => {
    const ex = state.exercises[exId];
    if(!ex) return;
    const sets = [];
    let i = 0;
    while(true){
      const w = document.getElementById(`set-w-${exId}-${i}`);
      const r = document.getElementById(`set-r-${exId}-${i}`);
      if(!w || !r) break;
      const wv = parseFloat(w.value);
      const rv = parseInt(r.value,10);
      if(!isNaN(wv) && !isNaN(rv) && wv>0 && rv>0) sets.push({weight:wv, reps:rv});
      i++;
    }
    if(sets.length){ entries[exId] = sets; anyFilled = true; }
  });

  if(!anyFilled){ toast('Log at least one set before finishing.'); return; }

  const willAscend = [];
  day.exerciseIds.forEach(exId => {
    if(!entries[exId]) return;
    const before = getProgressionStatus(exId);
    const tempLog = {id:'temp', dayId:day.id, date:new Date().toISOString(), entries:{[exId]:entries[exId]}};
    state.logs.push(tempLog);
    const after = getProgressionStatus(exId);
    state.logs.pop();
    if(after.ready && !before.ready) willAscend.push(state.exercises[exId].name);
  });

  state.logs.push({ id: uid('log'), dayId: day.id, date: new Date().toISOString(), entries });
  advanceCycle();
  save();
  renderToday();
  renderProgress();

  if(willAscend.length){
    toast(`Logged. Time to ascend on ${willAscend.length>1 ? willAscend.length+' lifts' : willAscend[0]} next time.`);
  } else {
    toast('Workout logged. Nice work.');
  }
}

function undoLastLog(){
  if(!state.logs.length){ toast('No workouts to undo.'); return false; }
  if(!confirm('Remove the most recently logged workout? This cannot be undone.')) return false;
  state.logs.pop();
  state.cycleIndex = (state.cycleIndex - 1 + state.days.length) % state.days.length;
  save();
  renderAll();
  toast('Last workout removed.');
  return true;
}

function addLibraryExerciseToDay(name, muscle, dayId){
  let existing = Object.values(state.exercises).find(e => e.name===name);
  let exId;
  if(existing){ exId = existing.id; }
  else{
    exId = uid('ex');
    state.exercises[exId] = {id:exId, name, muscle, sets:2, repMin:8, repMax:10, increment:defaultIncrement(muscle), custom:false};
  }
  const day = state.days.find(d => d.id===dayId);
  if(!day.exerciseIds.includes(exId)) day.exerciseIds.push(exId);
  save();
}

/* ---------- rendering: sparkline ---------- */
function sparklineSvg(values){
  if(values.length<2) return '';
  const w=260, h=46, pad=4;
  const min=Math.min(...values), max=Math.max(...values);
  const range=(max-min)||1;
  const pts = values.map((v,i) => {
    const x = pad + (i*(w-2*pad))/(values.length-1);
    const y = h-pad - ((v-min)/range)*(h-2*pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    <polyline points="${pts}" fill="none" stroke="#C1572A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

/* ---------- rendering: today ---------- */
function getInstallHintHtml(){
  if(window.matchMedia('(display-mode: standalone)').matches) return '';
  if(localStorage.getItem(HINT_KEY)) return '';
  return `<div class="install-hint" id="install-hint">
    Tip: open your browser menu and choose "Add to Home Screen" so Iron Log installs like an app.
    <button id="dismiss-hint">Got it</button>
  </div>`;
}
function wireInstallHint(){
  const btn = document.getElementById('dismiss-hint');
  if(btn) btn.addEventListener('click', () => {
    localStorage.setItem(HINT_KEY, '1');
    document.getElementById('install-hint').remove();
  });
}

const ONBOARDING_KEY = 'ironlog.onboarding';

function getOnboardingHtml(){
  if(localStorage.getItem(ONBOARDING_KEY)) return '';
  return `<div class="onboarding-card" id="onboarding-card">
    <button class="onboarding-close" id="dismiss-onboarding" aria-label="Dismiss">×</button>
    <p class="onboarding-title">How Iron Log works</p>
    <p class="onboarding-body">
      Each session, log the <strong>weight and reps</strong> for every set.<br><br>
      Hit your top rep target on <strong>all sets, two sessions in a row</strong> at the same weight — the app tells you it's <strong>Time to Ascend</strong> and bumps the suggested weight up.<br><br>
      The two dots <strong>●●</strong> on each exercise track your streak toward that trigger.
    </p>
  </div>`;
}
function wireOnboarding(){
  const btn = document.getElementById('dismiss-onboarding');
  if(btn) btn.addEventListener('click', () => {
    localStorage.setItem(ONBOARDING_KEY, '1');
    document.getElementById('onboarding-card').remove();
  });
}

function renderExerciseCard(ex){
  if(!ex) return '';
  const status = getProgressionStatus(ex.id);
  const lastSets = status.lastSession ? status.lastSession.sets : null;
  const dotsHtml = [0,1].map(i => `<span class="streak-dot ${i < status.streak ? 'filled':''}"></span>`).join('');
  const streakLabel = status.ready ? 'add weight!' : `${status.streak}/2 sessions`;
  const badgeHtml = status.ready ? `
    <div class="ascend-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"></path></svg>
      Time to ascend — add ${formatWeight(ex.increment)}kg
    </div>` : '';

  const setsHtml = Array.from({length: ex.sets}).map((_,i) => {
    const lastSet = lastSets ? lastSets[i] : null;
    const prefillWeight = status.ready ? status.suggestedWeight : (lastSet ? lastSet.weight : '');
    const placeholderReps = lastSet ? `last ${lastSet.reps}` : 'reps';
    return `
      <div class="set-row">
        <span class="set-row-label">${i+1}</span>
        <input class="set-input unit" type="text" inputmode="decimal" placeholder="kg" value="${(prefillWeight===''||prefillWeight==null)?'':prefillWeight}" id="set-w-${ex.id}-${i}">
        <span class="set-x">×</span>
        <input class="set-input" type="text" inputmode="numeric" placeholder="${placeholderReps}" id="set-r-${ex.id}-${i}">
      </div>`;
  }).join('');

  const lastLine = lastSets
    ? `Last: ${lastSets.map(s => `${formatWeight(s.weight)}kg × ${s.reps}`).join(' · ')}`
    : `No history yet — target ${ex.repMin}–${ex.repMax} reps`;

  const lastWeight = (lastSets && lastSets.length) ? lastSets[lastSets.length-1].weight : '';
  return `
    <div class="ex-card" data-ex="${ex.id}">
      <div class="ex-card-top">
        <div>
          <div class="ex-name">${escapeHtml(ex.name)}</div>
          <div class="ex-meta"><span class="ex-muscle-tag">${ex.muscle}</span> · ${ex.repMin}–${ex.repMax} reps</div>
        </div>
        <div class="streak-wrap">
          <div class="streak-dots">${dotsHtml}</div>
          <span class="streak-count">${streakLabel}</span>
        </div>
      </div>
      ${badgeHtml}
      <div class="set-rows" id="set-rows-${ex.id}">${setsHtml}</div>
      <div class="set-actions">
        <button class="btn-add-set" data-add-set="${ex.id}" data-last-weight="${lastWeight}">+ Set</button>
        <button class="btn-remove-set" data-remove-set="${ex.id}" ${ex.sets <= 1 ? 'disabled' : ''} aria-label="Remove last set">−</button>
      </div>
      <div class="last-line">${lastLine}</div>
    </div>`;
}

function renderToday(){
  const root = document.getElementById('view-today');
  const day = state.days[state.cycleIndex];
  const pips = state.days.map((d,i) =>
    `<span class="cycle-pip ${i===state.cycleIndex?'is-current':''} ${d.label==='Rest'?'is-rest':''}"></span>`
  ).join('');

  if(!day || day.label==='Rest' || day.exerciseIds.length===0){
    const nextDay = state.days[(state.cycleIndex+1)%state.days.length];
    root.innerHTML = `
      ${getInstallHintHtml()}
      <div class="cycle-track">${pips}</div>
      <div class="day-heading">
        <p class="day-eyebrow">Day ${state.cycleIndex+1} of ${state.days.length}</p>
        <h1 class="day-title">Rest</h1>
      </div>
      <div class="rest-card">
        <span class="ex-name">No lifting today</span>
        <p>Recovery is part of the program. Sleep, eat, hydrate — back under the bar next session.</p>
        <button class="btn btn-primary" id="btn-finish-rest">Mark Done → Next: ${escapeHtml(nextDay.label)}</button>
      </div>`;
    wireInstallHint();
    document.getElementById('btn-finish-rest').addEventListener('click', () => {
      advanceCycle(); save(); renderToday();
      toast('Rest logged. Back at it next session.');
    });
    return;
  }

  const cardsHtml = day.exerciseIds.map(id => renderExerciseCard(state.exercises[id])).join('');
  root.innerHTML = `
    ${getInstallHintHtml()}
    ${getOnboardingHtml()}
    <div class="cycle-track">${pips}</div>
    <div class="day-heading">
      <p class="day-eyebrow">Day ${state.cycleIndex+1} of ${state.days.length}</p>
      <h1 class="day-title">${escapeHtml(day.label)}</h1>
    </div>
    ${cardsHtml}
    <div class="finish-bar">
      <button class="btn btn-primary" id="btn-finish">Finish Workout</button>
    </div>`;
  wireInstallHint();
  wireOnboarding();
  document.getElementById('btn-finish').addEventListener('click', finishWorkout);
  root.addEventListener('click', (e) => {
    // + Set
    const addBtn = e.target.closest('[data-add-set]');
    if(addBtn){
      const exId = addBtn.dataset.addSet;
      const container = document.getElementById(`set-rows-${exId}`);
      if(!container) return;
      const nextIdx = container.querySelectorAll('.set-row').length;
      const prefill = addBtn.dataset.lastWeight || '';
      const row = document.createElement('div');
      row.className = 'set-row';
      row.innerHTML = `
        <span class="set-row-label">${nextIdx+1}</span>
        <input class="set-input unit" type="text" inputmode="decimal" placeholder="kg" value="${escapeHtml(String(prefill))}" id="set-w-${exId}-${nextIdx}">
        <span class="set-x">×</span>
        <input class="set-input" type="text" inputmode="numeric" placeholder="reps" id="set-r-${exId}-${nextIdx}">
      `;
      container.appendChild(row);
      row.querySelector('input').focus();
      // enable − since we now have 2+ rows
      const rmBtn = addBtn.closest('.ex-card')?.querySelector('[data-remove-set]');
      if(rmBtn) rmBtn.disabled = false;
      return;
    }
    // − Set
    const rmBtn = e.target.closest('[data-remove-set]');
    if(rmBtn){
      const exId = rmBtn.dataset.removeSet;
      const container = document.getElementById(`set-rows-${exId}`);
      if(!container) return;
      const rows = container.querySelectorAll('.set-row');
      if(rows.length <= 1) return; // button should be disabled, but safety guard
      rows[rows.length - 1].remove();
      // disable − if now at 1 row
      if(container.querySelectorAll('.set-row').length <= 1) rmBtn.disabled = true;
    }
  });
}

/* ---------- rendering: progress ---------- */
function renderProgressCard(ex){
  const history = exerciseLogsInOrder(ex.id);
  const status = getProgressionStatus(ex.id);
  const dotsHtml = [0,1].map(i => `<span class="streak-dot ${i < status.streak ? 'filled':''}"></span>`).join('');

  if(!history.length){
    return `
      <div class="progress-card">
        <div class="progress-card-head" style="cursor:default; opacity:0.6;">
          <div>
            <div class="ex-name" style="font-size:14.5px;">${escapeHtml(ex.name)}</div>
            <div class="ex-meta">${ex.repMin}–${ex.repMax} reps · not yet logged</div>
          </div>
        </div>
      </div>`;
  }

  const last = history[history.length-1];
  const bestWeight = Math.max(...history.map(h => Math.max(...h.sets.map(s=>s.weight))));
  const spark = sparklineSvg(history.map(h => Math.max(...h.sets.map(s=>s.weight))));
  const rows = history.slice(-6).reverse().map(h =>
    `<tr><td>${formatDate(h.date)}</td><td>${h.sets.map(s=>`${formatWeight(s.weight)}×${s.reps}`).join(', ')}</td></tr>`
  ).join('');

  return `
    <div class="progress-card" data-ex="${ex.id}">
      <div class="progress-card-head">
        <div>
          <div class="ex-name" style="font-size:14.5px;">${escapeHtml(ex.name)}</div>
          <div class="ex-meta">${ex.repMin}–${ex.repMax} reps · last: ${formatWeight(last.sets[0].weight)}kg</div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
          <div class="streak-dots">${dotsHtml}</div>
          <span class="expand-hint">history <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"></path></svg></span>
        </div>
      </div>
      <div class="progress-card-body hidden">
        <div class="progress-stats">
          <div class="stat"><div class="stat-label">Best</div><div class="stat-value">${formatWeight(bestWeight)}</div></div>
          <div class="stat"><div class="stat-label">Last</div><div class="stat-value">${formatWeight(last.sets[0].weight)}</div></div>
          <div class="stat"><div class="stat-label">Sessions</div><div class="stat-value">${history.length}</div></div>
        </div>
        <div class="spark-wrap">${spark}</div>
        <table class="history-table"><thead><tr><th>Date</th><th>Sets</th></tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>`;
}

function renderProgress(){
  const root = document.getElementById('view-progress');
  const allEx = Object.values(state.exercises);
  if(!allEx.length){
    root.innerHTML = `<div class="day-heading" style="margin-top:6px;"><p class="day-eyebrow">All Lifts</p><h1 class="day-title">Progress</h1></div>
      <div class="empty-note">No exercises yet. Add some in the Split tab.</div>`;
    return;
  }
  const byMuscle = {};
  allEx.forEach(ex => { (byMuscle[ex.muscle] = byMuscle[ex.muscle]||[]).push(ex); });

  let html = `<div class="day-heading" style="margin-top:6px;"><p class="day-eyebrow">All Lifts</p><h1 class="day-title">Progress</h1></div>`;
  Object.keys(byMuscle).sort().forEach(muscle => {
    html += `<div class="section-title">${muscle}</div>`;
    byMuscle[muscle].forEach(ex => { html += renderProgressCard(ex); });
  });
  root.innerHTML = html;

  root.querySelectorAll('.progress-card[data-ex]').forEach(card => {
    const head = card.querySelector('.progress-card-head');
    const body = card.querySelector('.progress-card-body');
    if(head && body) head.addEventListener('click', () => {
      body.classList.toggle('hidden');
      head.classList.toggle('open');
    });
  });
}

/* ---------- rendering: split ---------- */
function renderSplit(){
  const root = document.getElementById('view-split');
  let html = `<div class="day-heading" style="margin-top:6px;"><p class="day-eyebrow">Manage</p><h1 class="day-title">Split</h1></div>`;

    <button class="segment-btn ${splitSegment==='days'?'active':''}" data-segment="days">Days</button>
    <button class="segment-btn ${splitSegment==='exercises'?'active':''}" data-segment="exercises">Exercises</button>
  </div>`;

    state.days.forEach((day,i) => {
      const exListHtml = day.exerciseIds.map((id, idx) => {
        const ex = state.exercises[id];
        if(!ex) return '';
        const isFirst = idx === 0;
        const isLast = idx === day.exerciseIds.length - 1;
        return `
          <div class="day-ex-item">
            <div class="day-ex-reorder">
              <button class="day-ex-arrow" data-move-up="${id}" data-day="${day.id}" data-idx="${idx}" ${isFirst?'disabled':''} aria-label="Move up">↑</button>
              <button class="day-ex-arrow" data-move-down="${id}" data-day="${day.id}" data-idx="${idx}" ${isLast?'disabled':''} aria-label="Move down">↓</button>
            </div>
            <span class="day-ex-name">${escapeHtml(ex.name)}</span>
            <button class="day-ex-remove" data-remove-ex="${id}" data-day="${day.id}" aria-label="Remove">×</button>
          </div>`;
      }).join('');
      html += `
        <div class="day-card" data-day="${day.id}">
          <div class="day-card-head">
            <input class="day-label-input" value="${escapeHtml(day.label)}" data-day-label="${day.id}">
            <span class="day-num">Day ${i+1}</span>
          </div>
          <div class="day-ex-list">${exListHtml}</div>
          <button class="chip chip-add" data-add-day="${day.id}">+ Exercise</button>
        </div>`;
    });
  } else {
    html += `<div class="section-title" style="margin-top:0;">All Exercises</div>`;
    Object.values(state.exercises).forEach(ex => {
      html += `
        <div class="ex-edit-card">
          <div class="ex-edit-head">
            <div class="ex-edit-name-wrap">
              <input class="ex-edit-name" value="${escapeHtml(ex.name)}" data-name="${ex.id}">
              <span class="ex-edit-muscle">${ex.muscle}</span>
            </div>
            <button class="ex-row-del" data-delete-ex="${ex.id}" aria-label="Delete">
              <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6"></path></svg>
            </button>
          </div>
          <div class="ex-edit-fields">
            <div class="ex-edit-field">
              <label class="ex-edit-label">Sets</label>
              <input type="number" class="ex-edit-input" min="1" max="6" value="${ex.sets}" data-sets="${ex.id}">
            </div>
            <div class="ex-edit-field">
              <label class="ex-edit-label">Min reps</label>
              <input type="number" class="ex-edit-input" min="1" max="30" value="${ex.repMin}" data-repmin="${ex.id}">
            </div>
            <div class="ex-edit-field">
              <label class="ex-edit-label">Max reps</label>
              <input type="number" class="ex-edit-input" min="1" max="30" value="${ex.repMax}" data-repmax="${ex.id}">
            </div>
            <div class="ex-edit-field">
              <label class="ex-edit-label">+kg</label>
              <input type="number" class="ex-edit-input" step="0.25" min="0.25" value="${ex.increment}" data-increment="${ex.id}">
            </div>
          </div>
        </div>`;
    });
    html += `<button class="btn btn-outline" id="btn-add-custom-ex" style="margin-top:6px; margin-bottom:8px;">+ Add New Exercise</button>`;
  }

  root.innerHTML = html;
  root.querySelectorAll('[data-segment]').forEach(btn => {
    btn.addEventListener('click', () => { splitSegment = btn.dataset.segment; renderSplit(); });
  });
  wireSplitView(root);
}

function wireSplitView(root){
  root.querySelectorAll('[data-day-label]').forEach(input => {
    input.addEventListener('change', () => {
      const day = state.days.find(d => d.id === input.dataset.dayLabel);
      if(day){ day.label = input.value.trim() || 'Day'; save(); }
    });
  });
  root.querySelectorAll('[data-remove-ex]').forEach(btn => {
    btn.addEventListener('click', () => {
      const day = state.days.find(d => d.id === btn.dataset.day);
      const exId = btn.dataset.removeEx;
      const ex = state.exercises[exId];
      if(!day || !ex) return;
      const idx = day.exerciseIds.indexOf(exId);
      // remove immediately
      day.exerciseIds = day.exerciseIds.filter(id => id !== exId);
      save(); renderSplit(); safeRenderToday();
      // offer undo for 4 seconds
      toastWithUndo(`"${ex.name}" removed from ${day.label}.`, () => {
        // restore at original position
        if(idx >= 0 && idx <= day.exerciseIds.length){
          day.exerciseIds.splice(idx, 0, exId);
        } else {
          day.exerciseIds.push(exId);
        }
        save(); renderSplit(); safeRenderToday();
        toast(`"${ex.name}" restored.`);
      });
    });
  });
  root.querySelectorAll('[data-add-day]').forEach(btn => {
    btn.addEventListener('click', () => openExercisePicker(btn.dataset.addDay));
  });
  root.querySelectorAll('[data-move-up]').forEach(btn => {
    btn.addEventListener('click', () => {
      const day = state.days.find(d => d.id === btn.dataset.day);
      const idx = parseInt(btn.dataset.idx, 10);
      if(day && idx > 0){
        [day.exerciseIds[idx-1], day.exerciseIds[idx]] = [day.exerciseIds[idx], day.exerciseIds[idx-1]];
        save(); renderSplit();
      }
    });
  });
  root.querySelectorAll('[data-move-down]').forEach(btn => {
    btn.addEventListener('click', () => {
      const day = state.days.find(d => d.id === btn.dataset.day);
      const idx = parseInt(btn.dataset.idx, 10);
      if(day && idx < day.exerciseIds.length - 1){
        [day.exerciseIds[idx], day.exerciseIds[idx+1]] = [day.exerciseIds[idx+1], day.exerciseIds[idx]];
        save(); renderSplit();
      }
    });
  });
  root.querySelectorAll('[data-name]').forEach(input => {
    input.addEventListener('change', () => {
      if(state.exercises[input.dataset.name]) state.exercises[input.dataset.name].name = input.value.trim() || 'Exercise';
      save();
    });
  });
  root.querySelectorAll('[data-sets]').forEach(input => {
    input.addEventListener('input', () => {
      const v = clampInt(input.value, 1, 6, 2);
      if(state.exercises[input.dataset.sets]) state.exercises[input.dataset.sets].sets = v;
      save();
    });
  });
  root.querySelectorAll('[data-repmin]').forEach(input => {
    input.addEventListener('input', () => {
      if(state.exercises[input.dataset.repmin]) state.exercises[input.dataset.repmin].repMin = clampInt(input.value,1,30,8);
      save();
    });
  });
  root.querySelectorAll('[data-repmax]').forEach(input => {
    input.addEventListener('input', () => {
      if(state.exercises[input.dataset.repmax]) state.exercises[input.dataset.repmax].repMax = clampInt(input.value,1,30,10);
      save();
    });
  });
  root.querySelectorAll('[data-increment]').forEach(input => {
    input.addEventListener('input', () => {
      const v = parseFloat(input.value);
      if(state.exercises[input.dataset.increment]) state.exercises[input.dataset.increment].increment = (!isNaN(v) && v > 0) ? v : 1;
      save();
    });
  });
  root.querySelectorAll('[data-delete-ex]').forEach(btn => {
    btn.addEventListener('click', () => {
      const exId = btn.dataset.deleteEx;
      const ex = state.exercises[exId];
      if(!ex) return;
      const sessionCount = state.logs.filter(l => l.entries && l.entries[exId]).length;
      const historyNote = sessionCount > 0 ? ` This will also erase its ${sessionCount} logged session${sessionCount>1?'s':''}.` : '';
      if(!confirm(`Delete "${ex.name}"?${historyNote} This cannot be undone.`)) return;
      // purge exercise
      delete state.exercises[exId];
      // remove from all days
      state.days.forEach(d => { d.exerciseIds = d.exerciseIds.filter(id => id !== exId); });
      // clean up orphaned log entries so storage doesn't grow forever
      state.logs.forEach(log => { if(log.entries) delete log.entries[exId]; });
      // remove now-empty logs
      state.logs = state.logs.filter(log => log.entries && Object.keys(log.entries).length > 0);
      save(); renderSplit(); renderProgress(); safeRenderToday();
      toast(`"${ex.name}" deleted.`);
    });
  });
  const addCustomBtn = document.getElementById('btn-add-custom-ex');
  if(addCustomBtn) addCustomBtn.addEventListener('click', () => openCustomExerciseForm());
}

/* ---------- sheet: exercise picker ---------- */
function openExercisePicker(dayId){
  const day = state.days.find(d => d.id===dayId);
  let activeMuscle = 'All';
  const muscleOptions = ['All', ...MUSCLES];

  function listHtml(){
    const items = EXERCISE_LIBRARY.filter(item => activeMuscle==='All' || item.muscle===activeMuscle);
    if(!items.length) return `<div class="empty-note">No matches.</div>`;
    return items.map(item => {
      const alreadyAdded = day.exerciseIds.some(id => state.exercises[id] && state.exercises[id].name===item.name);
      return `<button class="picker-item ${alreadyAdded?'added':''}" data-pick="${escapeHtml(item.name)}" data-muscle="${item.muscle}" ${alreadyAdded?'disabled':''}>
        <span>${escapeHtml(item.name)}</span><span class="muscle">${item.muscle}</span>
      </button>`;
    }).join('');
  }
  function chipsHtml(){
    return muscleOptions.map(m => `<button class="muscle-chip ${m===activeMuscle?'active':''}" data-muscle-filter="${m}">${m}</button>`).join('');
  }
  function render(){
    setSheet(`
      <div class="sheet-handle"></div>
      <h2 class="sheet-title">Add to ${escapeHtml(day.label)}</h2>
      <div class="muscle-filter">${chipsHtml()}</div>
      <div class="picker-list">${listHtml()}</div>
      <button class="btn btn-outline" style="margin-top:14px;" id="btn-open-custom">+ Add Custom Exercise</button>
    `);
    document.querySelectorAll('[data-muscle-filter]').forEach(btn => {
      btn.addEventListener('click', () => { activeMuscle = btn.dataset.muscleFilter; render(); });
    });
    document.querySelectorAll('[data-pick]').forEach(btn => {
      btn.addEventListener('click', () => {
        addLibraryExerciseToDay(btn.dataset.pick, btn.dataset.muscle, dayId);
        closeSheet(); renderSplit(); safeRenderToday();
        toast(`${btn.dataset.pick} added to ${day.label}.`);
      });
    });
    document.getElementById('btn-open-custom').addEventListener('click', () => openCustomExerciseForm(dayId));
  }
  render();
  openSheet();
}

/* ---------- sheet: custom exercise ---------- */
function openCustomExerciseForm(dayId){
  function showForm(){
    // form state
    let selectedMuscle = 'Chest';
    let setsVal = 2, repMinVal = 8, repMaxVal = 10, incrVal = 2.5;

    function musclePills(){
      return MUSCLES.map(m => `
        <button class="muscle-pill ${m===selectedMuscle?'active':''}" data-mpick="${m}">${m}</button>
      `).join('');
    }

    function buildSheet(){
      setSheet(`
        <div class="sheet-handle"></div>
        <h2 class="sheet-title">${dayId ? 'Add Custom Exercise' : 'New Exercise'}</h2>

        <label class="field-label">Name</label>
        <input class="text-input" id="cf-name" placeholder="e.g. Cable Fly" autocomplete="off">

        <label class="field-label">Muscle group</label>
        <div class="muscle-pill-grid" id="cf-muscle-grid">${musclePills()}</div>
        <input type="hidden" id="cf-muscle" value="${selectedMuscle}">

        <label class="field-label">Sets</label>
        <div class="stepper">
          <button class="stepper-btn" id="sets-minus" ${setsVal<=1?'disabled':''}>−</button>
          <input class="stepper-val" id="cf-sets" type="number" value="${setsVal}" min="1" max="6" inputmode="numeric" readonly>
          <button class="stepper-btn" id="sets-plus" ${setsVal>=6?'disabled':''}>+</button>
        </div>

        <label class="field-label">Rep range</label>
        <div class="rep-row">
          <div class="stepper">
            <button class="stepper-btn" id="repmin-minus" ${repMinVal<=1?'disabled':''}>−</button>
            <input class="stepper-val" id="cf-repmin" type="number" value="${repMinVal}" min="1" max="30" inputmode="numeric" readonly>
            <button class="stepper-btn" id="repmin-plus" ${repMinVal>=30?'disabled':''}>+</button>
          </div>
          <div style="display:flex;align-items:center;padding:0 4px;color:var(--chalk-dim);font-family:var(--mono);font-size:13px;">to</div>
          <div class="stepper">
            <button class="stepper-btn" id="repmax-minus" ${repMaxVal<=1?'disabled':''}>−</button>
            <input class="stepper-val" id="cf-repmax" type="number" value="${repMaxVal}" min="1" max="30" inputmode="numeric" readonly>
            <button class="stepper-btn" id="repmax-plus" ${repMaxVal>=30?'disabled':''}>+</button>
          </div>
        </div>

        <label class="field-label">Weight increment (kg)</label>
        <div class="stepper">
          <button class="stepper-btn" id="incr-minus" ${incrVal<=0.25?'disabled':''}>−</button>
          <input class="stepper-val" id="cf-increment" type="number" value="${incrVal}" inputmode="decimal" readonly>
          <button class="stepper-btn" id="incr-plus">+</button>
        </div>

        <button class="btn btn-primary" id="cf-save" style="margin-top:22px;">
          ${dayId ? 'Add Exercise' : 'Next: Choose Days →'}
        </button>
      `);

      document.getElementById('cf-name').focus();

      // muscle pills
      document.getElementById('cf-muscle-grid').addEventListener('click', e => {
        const pill = e.target.closest('[data-mpick]');
        if(!pill) return;
        selectedMuscle = pill.dataset.mpick;
        document.getElementById('cf-muscle').value = selectedMuscle;
        document.querySelectorAll('[data-mpick]').forEach(p => p.classList.toggle('active', p.dataset.mpick === selectedMuscle));
      });

      // stepper helper
      function wireStep(minusId, plusId, inputId, step, min, max, getVal, setVal){
        document.getElementById(minusId).addEventListener('click', () => {
          const next = Math.round((getVal() - step) * 100) / 100;
          if(next < min) return;
          setVal(next);
          document.getElementById(inputId).value = next;
          document.getElementById(minusId).disabled = next <= min;
          document.getElementById(plusId).disabled = next >= max;
        });
        document.getElementById(plusId).addEventListener('click', () => {
          const next = Math.round((getVal() + step) * 100) / 100;
          if(next > max) return;
          setVal(next);
          document.getElementById(inputId).value = next;
          document.getElementById(minusId).disabled = next <= min;
          document.getElementById(plusId).disabled = next >= max;
        });
      }

      wireStep('sets-minus','sets-plus','cf-sets',1,1,6,()=>setsVal,v=>setsVal=v);
      wireStep('repmin-minus','repmin-plus','cf-repmin',1,1,30,()=>repMinVal,v=>repMinVal=v);
      wireStep('repmax-minus','repmax-plus','cf-repmax',1,1,30,()=>repMaxVal,v=>repMaxVal=v);
      wireStep('incr-minus','incr-plus','cf-increment',0.25,0.25,20,()=>incrVal,v=>incrVal=v);

      document.getElementById('cf-save').addEventListener('click', () => {
        const name = document.getElementById('cf-name').value.trim();
        if(!name){ toast('Give it a name first.'); return; }
        const exId = uid('ex');
        state.exercises[exId] = {
          id:exId, name,
          muscle: selectedMuscle,
          sets: setsVal,
          repMin: repMinVal,
          repMax: repMaxVal,
          increment: incrVal,
          custom:true
        };
        if(dayId){
          state.days.find(d=>d.id===dayId).exerciseIds.push(exId);
          save(); closeSheet(); renderSplit(); safeRenderToday();
          toast(`${name} added to ${state.days.find(d=>d.id===dayId)?.label || 'day'}.`);
        } else {
          save();
          showDayPicker(exId, name);
        }
      });
    }

    buildSheet();
  }

  function showDayPicker(exId, name){
    const nonRestDays = state.days.filter(d => d.label !== 'Rest');
    const dayRows = nonRestDays.map((d,i) => `
      <label class="day-check-row">
        <input type="checkbox" class="day-check" value="${d.id}" id="dc-${i}">
        <span>${escapeHtml(d.label)} <span style="font-family:var(--mono); font-size:11px; color:var(--chalk-dim);">Day ${state.days.indexOf(d)+1}</span></span>
      </label>`).join('');
    setSheet(`
      <div class="sheet-handle"></div>
      <h2 class="sheet-title">Add to days</h2>
      <p style="font-size:13px; color:var(--chalk-dim); margin:0 0 16px; line-height:1.5;">
        Which days should <strong style="color:var(--chalk);">${escapeHtml(name)}</strong> appear in? You can change this any time in the Days tab.
      </p>
      ${dayRows || '<p style="color:var(--chalk-dim); font-size:13px;">No training days found. Add them in the Days tab.</p>'}
      <button class="btn btn-primary" id="cf-assign" style="margin-top:18px;">Done</button>
      <button class="btn btn-outline" id="cf-skip" style="margin-top:8px; color:var(--chalk-dim);">Skip — I'll add it to days later</button>
    `);
    document.getElementById('cf-assign').addEventListener('click', () => {
      const checked = [...document.querySelectorAll('.day-check:checked')].map(cb => cb.value);
      checked.forEach(dId => {
        const day = state.days.find(d => d.id === dId);
        if(day && !day.exerciseIds.includes(exId)) day.exerciseIds.push(exId);
      });
      save(); closeSheet(); renderSplit(); safeRenderToday();
      const msg = checked.length
        ? `${name} added to ${checked.length} day${checked.length>1?'s':''}.`
        : `${name} saved. Go to Days tab to schedule it.`;
      toast(msg);
    });
    document.getElementById('cf-skip').addEventListener('click', () => {
      closeSheet(); renderSplit();
      toast(`${name} saved to library. Add it to days from the Days tab.`);
    });
  }

  showForm();
  openSheet();
}

function openDayPicker(){
  const rows = state.days.map((d,i) => `
    <label class="day-check-row" style="cursor:pointer;">
      <input type="radio" name="day-pick" value="${i}" ${i===state.cycleIndex?'checked':''} style="accent-color:var(--rust); width:18px; height:18px; flex:none;">
      <span>
        Day ${i+1} — <strong>${escapeHtml(d.label)}</strong>
        ${i===state.cycleIndex ? '<span style="font-family:var(--mono);font-size:10px;color:var(--rust);margin-left:6px;">current</span>' : ''}
      </span>
    </label>`).join('');
  setSheet(`
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">Set Current Day</h2>
    <p style="font-size:13px; color:var(--chalk-dim); margin:0 0 14px; line-height:1.5;">
      If your cycle got out of sync, pick the day you're actually on. This only changes where you are in the rotation — it doesn't delete any history.
    </p>
    ${rows}
    <button class="btn btn-primary" id="dp-save" style="margin-top:18px;">Set Day</button>
  `);
  document.getElementById('dp-save').addEventListener('click', () => {
    const picked = document.querySelector('input[name="day-pick"]:checked');
    if(!picked) return;
    state.cycleIndex = parseInt(picked.value, 10);
    save(); closeSheet(); renderToday();
    toast(`Cycle set to Day ${state.cycleIndex+1} — ${state.days[state.cycleIndex].label}.`);
  });
}

function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `iron-log-backup-${todayISO()}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('Backup downloaded.');
}
function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed.days || !parsed.exercises) throw new Error('bad shape');
      state = parsed; save(); closeSheet(); renderAll();
      toast('Backup restored.');
    }catch(err){
      toast("That file doesn't look like a valid backup.");
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

/* ---------- sheet plumbing ---------- */
function setSheet(html){ document.getElementById('sheet-content').innerHTML = html; }
function openSheet(){ document.getElementById('sheet-backdrop').classList.remove('hidden'); }
function closeSheet(){ document.getElementById('sheet-backdrop').classList.add('hidden'); }

/* ---------- toast ---------- */
let toastTimer;
function toast(msg){
  const el = document.getElementById('toast');
  el.innerHTML = `<span class="toast-msg">${escapeHtml(msg)}</span>`;
  el.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.add('hidden'), 2600);
}
function toastWithUndo(msg, onUndo, delay=4000){
  const el = document.getElementById('toast');
  el.innerHTML = `<span class="toast-msg">${escapeHtml(msg)}</span><button class="toast-undo" id="toast-undo-btn">Undo</button>`;
  el.classList.remove('hidden');
  clearTimeout(toastTimer);
  let committed = false;
  const commit = () => { committed = true; el.classList.add('hidden'); };
  toastTimer = setTimeout(commit, delay);
  document.getElementById('toast-undo-btn').addEventListener('click', () => {
    if(committed) return;
    clearTimeout(toastTimer);
    el.classList.add('hidden');
    onUndo();
  });
}

/* ---------- nav / init ---------- */
function todayIsDirty(){
  return [...document.querySelectorAll('#view-today .set-input')].some(inp => inp.value.trim() !== '');
}
function safeRenderToday(){
  if(!todayIsDirty()) renderToday();
}
function switchView(view){
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  document.getElementById('view-'+view).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.view===view));
  window.scrollTo(0,0);
  if(view === 'progress') renderProgress();
  else if(view === 'split') renderSplit();
  else if(view === 'today' && !todayIsDirty()) renderToday();
}
function renderAll(){ renderToday(); renderProgress(); renderSplit(); }

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});
document.getElementById('btn-settings').addEventListener('click', openSettings);
document.getElementById('sheet-backdrop').addEventListener('click', (e) => {
  if(e.target.id==='sheet-backdrop') closeSheet();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

renderAll();
</script>
